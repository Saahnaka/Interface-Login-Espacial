<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Espacial</title>
    <!-- Ícones e Estilo -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- FUNDO ESPACIAL -->
    <div class="animacao">
      <div class="estrela-twinkle"></div>
      <div class="earth"></div>
      <div class="moon"></div>
      <div class="jupiter"></div>
      <div class="mars"></div>
      <div class="asteroide"></div>
      <div class="cometa"></div>
    </div>

    <!-- TELA 1: LOGIN -->
    <div class="formulario" id="form-login">
      <h1>Login</h1>
      <form
        onsubmit="
          event.preventDefault();
          alert('Login realizado (simulação)');
        "
      >
        <div class="caixa-formulario">
          <input type="email" placeholder="Email" required />
          <i class="bx bx-user"></i>
        </div>
        <div class="caixa-formulario">
          <input type="password" placeholder="Senha" required />
          <i class="bx bx-lock"></i>
        </div>
        <div class="caixa-lembrar-esqueci">
          <label><input type="checkbox" /> Lembrar</label>
          <a href="#">Esqueci minha senha</a>
        </div>
        <button type="submit">Entrar</button>
        <div class="link-registro">
          <p>
            Não tem conta?
            <a href="#" onclick="trocarTela('form-registro')">Registrar</a>
          </p>
        </div>
      </form>
    </div>

    <!-- TELA 2: REGISTRO (Com validações) -->
    <div class="formulario" id="form-registro" style="display: none">
      <h1>Criar Conta</h1>
      <p id="msg-erro" class="erro-texto"></p>

      <form onsubmit="validarEPassar(event)">
        <div class="caixa-formulario">
          <input type="email" id="reg-email" placeholder="E-mail" required />
          <i class="bx bx-envelope"></i>
        </div>
        <div class="caixa-formulario">
          <input
            type="password"
            id="reg-senha"
            placeholder="Senha (mín. 6 chars)"
            required
          />
          <i class="bx bx-lock-alt"></i>
        </div>
        <div class="caixa-formulario">
          <input
            type="password"
            id="reg-confirma"
            placeholder="Confirmar Senha"
            required
          />
          <i class="bx bx-check-shield"></i>
        </div>
        <button type="submit">Registrar</button>
        <div class="link-registro">
          <p>
            Já tem conta?
            <a href="#" onclick="trocarTela('form-login')">Faça Login</a>
          </p>
        </div>
      </form>
    </div>

    <!-- TELA 3: SUCESSO -->
    <div
      class="formulario"
      id="form-sucesso"
      style="display: none; text-align: center"
    >
      <i class="bx bx-check-circle" style="font-size: 70px; color: #00ff88"></i>
      <h2 style="color: #00ff88; margin-top: 15px">Sucesso!</h2>
      <p style="margin: 20px 0">Conta registrada com sucesso no sistema.</p>
      <button onclick="trocarTela('form-login')">Voltar para Login</button>
    </div>

    <script>
      function trocarTela(id) {
        document.getElementById("form-login").style.display = "none";
        document.getElementById("form-registro").style.display = "none";
        document.getElementById("form-sucesso").style.display = "none";
        document.getElementById(id).style.display = "block";
        document.getElementById("msg-erro").innerText = ""; // Limpa erros
      }

      function validarEPassar(e) {
        e.preventDefault();
        const senha = document.getElementById("reg-senha").value;
        const confirma = document.getElementById("reg-confirma").value;
        const erro = document.getElementById("msg-erro");

        if (senha.length < 6) {
          erro.innerText = "A senha deve ter no mínimo 6 caracteres.";
        } else if (senha !== confirma) {
          erro.innerText = "As senhas não coincidem!";
        } else {
          trocarTela("form-sucesso");
        }
      }
    </script>
  </body>
</html>
